name: "Deploy"
on:
  workflow_run:
    workflows: ["Test"]
    branches: ["master"]
    types:
      - "completed"
permissions:
  id-token: "write"
  contents: "read"
concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true
jobs:
  deploy:
    name: "Deploy"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Check out"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6.0.2
        with:
          # Show Git tags in version.
          fetch-depth: 0
      - name: "Set up Go"
        uses: "actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c" # v6.4.0
        with:
          go-version-file: "go.mod"
      - name: "Deploy starlet"
        run: "./.devtools/gha-deploy-service.bash starlet"
      - name: "Deploy tgfeed"
        run: "./.devtools/gha-deploy-service.bash tgfeed"
